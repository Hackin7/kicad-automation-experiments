name: Hardware CI

on:
  push:
    paths:
      - "hardware/**"
      - ".github/workflows/hardware.yml"
      - "tools/hardware-site/**"
  pull_request:
    paths:
      - "hardware/**"
      - ".github/workflows/hardware.yml"
      - "tools/hardware-site/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  HARDWARE_DIR: hardware/sao_coincell_adapter
  SCHEMATIC_FILE: hardware/sao_coincell_adapter/sao_coincell_adaptor.kicad_sch
  BOARD_FILE: hardware/sao_coincell_adapter/sao_coincell_adaptor.kicad_pcb

jobs:
  hardware-checks:
    name: ERC and DRC
    runs-on: ubuntu-latest
    outputs:
      reports_artifact_url: ${{ steps.upload-check-reports.outputs.artifact-url }}
      checks_result: ${{ steps.run-kibot-checks.outcome }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run KiBot ERC and DRC
        id: run-kibot-checks
        continue-on-error: true
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: ${{ env.HARDWARE_DIR }}/checks.kibot.yaml
          schema: ${{ env.SCHEMATIC_FILE }}
          board: ${{ env.BOARD_FILE }}
          dir: ${{ env.HARDWARE_DIR }}/output/checks

      - name: Upload ERC and DRC reports
        id: upload-check-reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: sao-coincell-adapter-check-reports
          path: ${{ env.HARDWARE_DIR }}/output/checks
          if-no-files-found: warn

  hardware-outputs:
    name: Documentation and fabrication outputs
    runs-on: ubuntu-latest
    needs: hardware-checks
    outputs:
      outputs_artifact_url: ${{ steps.upload-hardware-outputs.outputs.artifact-url }}
      outputs_result: ${{ steps.generate-hardware-outputs.outcome }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate KiCad outputs
        id: generate-hardware-outputs
        continue-on-error: true
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: ${{ env.HARDWARE_DIR }}/outputs.kibot.yaml
          schema: ${{ env.SCHEMATIC_FILE }}
          board: ${{ env.BOARD_FILE }}
          dir: ${{ env.HARDWARE_DIR }}/output/generated

      - name: Upload generated hardware outputs
        id: upload-hardware-outputs
        uses: actions/upload-artifact@v4
        with:
          name: sao-coincell-adapter-hardware-outputs
          path: ${{ env.HARDWARE_DIR }}/output/generated
          if-no-files-found: warn

  build-pages-site:
    name: Build GitHub Pages site
    runs-on: ubuntu-latest
    needs:
      - hardware-checks
      - hardware-outputs
    if: ${{ always() }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Download ERC and DRC reports
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: sao-coincell-adapter-check-reports
          path: site/reports

      - name: Download generated hardware outputs
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: sao-coincell-adapter-hardware-outputs
          path: site/outputs

      - name: Assemble static site
        shell: bash
        env:
          CHECKS_RESULT: ${{ needs.hardware-checks.outputs.checks_result }}
          OUTPUTS_RESULT: ${{ needs.hardware-outputs.outputs.outputs_result }}
        run: |
          set -euo pipefail

          mkdir -p site/reports site/outputs site/kicad site/model
          cp tools/hardware-site/index.html site/index.html
          cp tools/hardware-site/style.css site/style.css
          cp "${HARDWARE_DIR}/sao_coincell_adaptor.kicad_pro" site/kicad/
          cp "${HARDWARE_DIR}/sao_coincell_adaptor.kicad_sch" site/kicad/
          cp "${HARDWARE_DIR}/sao_coincell_adaptor.kicad_pcb" site/kicad/

          model_path="$(find "${HARDWARE_DIR}" site/outputs -iname '*.glb' 2>/dev/null | head -n 1 || true)"
          if [ -n "$model_path" ]; then
            cp "$model_path" site/model/board.glb
          fi

          cat > site/run-info.js <<EOF
          window.HARDWARE_CI = {
            runUrl: "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            sha: "${GITHUB_SHA}",
            checksResult: "${CHECKS_RESULT:-unknown}",
            outputsResult: "${OUTPUTS_RESULT:-unknown}"
          };
          EOF

          if [ ! -f site/reports/sao_coincell_adaptor-erc.html ]; then
            printf '<!doctype html><title>ERC report unavailable</title><h1>ERC report unavailable</h1><p>No ERC report artifact was produced for this run.</p>' > site/reports/sao_coincell_adaptor-erc.html
          fi
          if [ ! -f site/reports/sao_coincell_adaptor-drc.html ]; then
            printf '<!doctype html><title>DRC report unavailable</title><h1>DRC report unavailable</h1><p>No DRC report artifact was produced for this run.</p>' > site/reports/sao_coincell_adaptor-drc.html
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build-pages-site
    if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  hardware-summary:
    name: Hardware links
    runs-on: ubuntu-latest
    needs:
      - hardware-checks
      - hardware-outputs
      - deploy-pages
    if: ${{ always() }}

    steps:
      - name: Add links to run summary
        shell: bash
        env:
          CHECKS_RESULT: ${{ needs.hardware-checks.result }}
          OUTPUTS_RESULT: ${{ needs.hardware-outputs.result }}
          CHECKS_STEP_RESULT: ${{ needs.hardware-checks.outputs.checks_result }}
          OUTPUTS_STEP_RESULT: ${{ needs.hardware-outputs.outputs.outputs_result }}
          PAGES_URL: ${{ needs.deploy-pages.outputs.page_url }}
          REPORTS_ARTIFACT_URL: ${{ needs.hardware-checks.outputs.reports_artifact_url }}
          OUTPUTS_ARTIFACT_URL: ${{ needs.hardware-outputs.outputs.outputs_artifact_url }}
        run: |
          set -euo pipefail

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          reports_url="${REPORTS_ARTIFACT_URL:-$run_url#artifacts}"
          outputs_url="${OUTPUTS_ARTIFACT_URL:-$run_url#artifacts}"

          artifact_link() {
            local file_path="$1"
            local artifact_url="$2"
            printf '| `%s` | [Open artifact](%s) |\n' "$file_path" "$artifact_url"
          }

          {
            echo '# Hardware CI Summary'
            echo
            echo "| Item | Result |"
            echo "| --- | --- |"
            echo "| ERC and DRC job | \`${CHECKS_RESULT}\` |"
            echo "| ERC and DRC step | \`${CHECKS_STEP_RESULT:-unknown}\` |"
            echo "| Documentation and fabrication outputs job | \`${OUTPUTS_RESULT}\` |"
            echo "| Documentation and fabrication outputs step | \`${OUTPUTS_STEP_RESULT:-unknown}\` |"
            echo
            echo "Run: [${GITHUB_RUN_ID}](${run_url})"
            if [ -n "${PAGES_URL:-}" ]; then
              echo
              echo "Published review site: [${PAGES_URL}](${PAGES_URL})"
            fi
            echo
            echo '> GitHub Actions artifacts are downloaded as archives. Each row links to the artifact that contains the listed file.'
            echo
            echo '## Validation Reports'
            echo
            echo '| File | Link |'
            echo '| --- | --- |'
            artifact_link 'sao-coincell-adapter-check-reports/sao_coincell_adaptor-erc.html' "$reports_url"
            artifact_link 'sao-coincell-adapter-check-reports/sao_coincell_adaptor-drc.html' "$reports_url"
            echo
            echo '## Design PDFs'
            echo
            echo '| File | Link |'
            echo '| --- | --- |'
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-schematic.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-front-copper.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-back-copper.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-front-silkscreen.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-back-silkscreen.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-front-mask.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-back-mask.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-front-fab.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-back-fab.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-edge-cuts.pdf' "$outputs_url"
            echo
            echo '## BOM And Fabrication Outputs'
            echo
            echo '| File | Link |'
            echo '| --- | --- |'
            artifact_link 'sao-coincell-adapter-hardware-outputs/bom/sao_coincell_adaptor-generic-bom.csv' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/fab/sao_coincell_adaptor-generic-fab.zip' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/jlcpcb/sao_coincell_adaptor-jlcpcb-gerbers.zip' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/jlcpcb/sao_coincell_adaptor-jlcpcb-bom.csv' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/jlcpcb/sao_coincell_adaptor-jlcpcb-cpl.csv' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/ibom/sao_coincell_adaptor-ibom.html' "$outputs_url"
          } >> "$GITHUB_STEP_SUMMARY"

  hardware-gate:
    name: Hardware CI gate
    runs-on: ubuntu-latest
    needs:
      - hardware-checks
      - hardware-outputs
      - build-pages-site
      - deploy-pages
      - hardware-summary
    if: ${{ always() }}

    steps:
      - name: Fail if validation or output generation failed
        shell: bash
        env:
          CHECKS_STEP_RESULT: ${{ needs.hardware-checks.outputs.checks_result }}
          OUTPUTS_STEP_RESULT: ${{ needs.hardware-outputs.outputs.outputs_result }}
          PAGES_RESULT: ${{ needs.deploy-pages.result }}
        run: |
          set -euo pipefail
          failed=0

          if [ "${CHECKS_STEP_RESULT:-failure}" != "success" ]; then
            echo "ERC/DRC failed or did not complete: ${CHECKS_STEP_RESULT:-missing}"
            failed=1
          fi

          if [ "${OUTPUTS_STEP_RESULT:-failure}" != "success" ]; then
            echo "Hardware output generation failed or did not complete: ${OUTPUTS_STEP_RESULT:-missing}"
            failed=1
          fi

          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ] && { [ "${GITHUB_REF}" = "refs/heads/main" ] || [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; } && [ "${PAGES_RESULT}" != "success" ]; then
            echo "GitHub Pages deployment failed or did not complete: ${PAGES_RESULT}"
            failed=1
          fi

          exit "$failed"
