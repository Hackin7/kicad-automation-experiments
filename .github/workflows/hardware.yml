name: Hardware CI

on:
  push:
    paths:
      - "hardware/**"
      - ".github/workflows/hardware.yml"
  pull_request:
    paths:
      - "hardware/**"
      - ".github/workflows/hardware.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  HARDWARE_DIR: hardware/sao_coincell_adapter
  SCHEMATIC_FILE: hardware/sao_coincell_adapter/sao_coincell_adaptor.kicad_sch
  BOARD_FILE: hardware/sao_coincell_adapter/sao_coincell_adaptor.kicad_pcb

jobs:
  hardware-checks:
    name: ERC and DRC
    runs-on: ubuntu-latest
    outputs:
      reports_artifact_url: ${{ steps.upload-check-reports.outputs.artifact-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run KiBot ERC and DRC
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: ${{ env.HARDWARE_DIR }}/checks.kibot.yaml
          schema: ${{ env.SCHEMATIC_FILE }}
          board: ${{ env.BOARD_FILE }}
          dir: ${{ env.HARDWARE_DIR }}/output/checks

      - name: Upload ERC and DRC reports
        id: upload-check-reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: sao-coincell-adapter-check-reports
          path: ${{ env.HARDWARE_DIR }}/output/checks
          if-no-files-found: warn

  hardware-outputs:
    name: Documentation and fabrication outputs
    runs-on: ubuntu-latest
    needs: hardware-checks
    outputs:
      outputs_artifact_url: ${{ steps.upload-hardware-outputs.outputs.artifact-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate KiCad outputs
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: ${{ env.HARDWARE_DIR }}/outputs.kibot.yaml
          schema: ${{ env.SCHEMATIC_FILE }}
          board: ${{ env.BOARD_FILE }}
          dir: ${{ env.HARDWARE_DIR }}/output/generated

      - name: Upload generated hardware outputs
        id: upload-hardware-outputs
        uses: actions/upload-artifact@v4
        with:
          name: sao-coincell-adapter-hardware-outputs
          path: ${{ env.HARDWARE_DIR }}/output/generated
          if-no-files-found: error

  hardware-summary:
    name: Hardware links
    runs-on: ubuntu-latest
    needs:
      - hardware-checks
      - hardware-outputs
    if: ${{ always() }}

    steps:
      - name: Add links to run summary
        shell: bash
        env:
          CHECKS_RESULT: ${{ needs.hardware-checks.result }}
          OUTPUTS_RESULT: ${{ needs.hardware-outputs.result }}
          REPORTS_ARTIFACT_URL: ${{ needs.hardware-checks.outputs.reports_artifact_url }}
          OUTPUTS_ARTIFACT_URL: ${{ needs.hardware-outputs.outputs.outputs_artifact_url }}
        run: |
          set -euo pipefail

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          reports_url="${REPORTS_ARTIFACT_URL:-$run_url#artifacts}"
          outputs_url="${OUTPUTS_ARTIFACT_URL:-$run_url#artifacts}"

          artifact_link() {
            local file_path="$1"
            local artifact_url="$2"
            printf '| `%s` | [Open artifact](%s) |\n' "$file_path" "$artifact_url"
          }

          {
            echo '# Hardware CI Summary'
            echo
            echo "| Item | Result |"
            echo "| --- | --- |"
            echo "| ERC and DRC | \`${CHECKS_RESULT}\` |"
            echo "| Documentation and fabrication outputs | \`${OUTPUTS_RESULT}\` |"
            echo
            echo "Run: [${GITHUB_RUN_ID}](${run_url})"
            echo
            echo '> GitHub Actions artifacts are downloaded as archives. Each row links to the artifact that contains the listed file.'
            echo
            echo '## Validation Reports'
            echo
            echo '| File | Link |'
            echo '| --- | --- |'
            artifact_link 'sao-coincell-adapter-check-reports/sao_coincell_adaptor-erc.html' "$reports_url"
            artifact_link 'sao-coincell-adapter-check-reports/sao_coincell_adaptor-drc.html' "$reports_url"
            echo
            echo '## Design PDFs'
            echo
            echo '| File | Link |'
            echo '| --- | --- |'
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-schematic.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-front-copper.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-back-copper.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-front-silkscreen.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-back-silkscreen.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-front-mask.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-back-mask.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-front-fab.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-back-fab.pdf' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/pdf/sao_coincell_adaptor-pcb-edge-cuts.pdf' "$outputs_url"
            echo
            echo '## BOM And Fabrication Outputs'
            echo
            echo '| File | Link |'
            echo '| --- | --- |'
            artifact_link 'sao-coincell-adapter-hardware-outputs/bom/sao_coincell_adaptor-generic-bom.csv' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/fab/sao_coincell_adaptor-generic-fab.zip' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/jlcpcb/sao_coincell_adaptor-jlcpcb-gerbers.zip' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/jlcpcb/sao_coincell_adaptor-jlcpcb-bom.csv' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/jlcpcb/sao_coincell_adaptor-jlcpcb-cpl.csv' "$outputs_url"
            artifact_link 'sao-coincell-adapter-hardware-outputs/ibom/sao_coincell_adaptor-ibom.html' "$outputs_url"
          } >> "$GITHUB_STEP_SUMMARY"
