name: Hardware CI

on:
  push:
    paths:
      - "hardware/**"
      - ".github/workflows/hardware.yml"
      - "tools/hardware-site/**"
      - "tools/hardware-3d/**"
  pull_request:
    paths:
      - "hardware/**"
      - ".github/workflows/hardware.yml"
      - "tools/hardware-site/**"
      - "tools/hardware-3d/**"
  workflow_dispatch:
    inputs:
      diff_base_ref:
        description: "Git ref to compare against for schematic and PCB visual diffs"
        required: false
        default: "main"

permissions:
  contents: read

jobs:
  project-matrix:
    name: Hardware project matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.projects.outputs.matrix }}
      projects: ${{ steps.projects.outputs.projects }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load hardware projects
        id: projects
        shell: bash
        run: |
          set -euo pipefail
          projects="$(jq -c '.' hardware/projects.json)"
          matrix="$(jq -c '{include: .}' hardware/projects.json)"
          echo "projects=${projects}" >> "$GITHUB_OUTPUT"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  hardware-checks:
    name: ERC and DRC (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: project-matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.project-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run KiBot ERC and DRC
        id: run-kibot-checks
        continue-on-error: true
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: ${{ matrix.dir }}/${{ matrix.checks_config }}
          schema: ${{ matrix.dir }}/${{ matrix.schematic }}
          board: ${{ matrix.dir }}/${{ matrix.board }}
          dir: ${{ matrix.dir }}/output/checks

      - name: Upload ERC and DRC reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.slug }}-check-reports
          path: ${{ matrix.dir }}/output/checks
          if-no-files-found: warn

      - name: Fail if ERC or DRC failed
        if: ${{ steps.run-kibot-checks.outcome != 'success' }}
        shell: bash
        run: |
          echo "ERC/DRC failed for ${{ matrix.name }}."
          exit 1

  hardware-outputs:
    name: Documentation and fabrication outputs (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs:
      - project-matrix
      - hardware-checks
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.project-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate KiCad outputs
        id: generate-hardware-outputs
        continue-on-error: true
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: ${{ matrix.dir }}/${{ matrix.outputs_config }}
          schema: ${{ matrix.dir }}/${{ matrix.schematic }}
          board: ${{ matrix.dir }}/${{ matrix.board }}
          dir: ${{ matrix.dir }}/output/generated

      - name: Upload generated hardware outputs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.slug }}-hardware-outputs
          path: ${{ matrix.dir }}/output/generated
          if-no-files-found: warn

      - name: Fail if hardware output generation failed
        if: ${{ steps.generate-hardware-outputs.outcome != 'success' }}
        shell: bash
        run: |
          echo "Hardware output generation failed for ${{ matrix.name }}."
          exit 1

  hardware-3d-model:
    name: 3D model (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs:
      - project-matrix
      - hardware-checks
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.project-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Export VRML model with KiBot
        id: export-vrml
        continue-on-error: true
        uses: INTI-CMNB/KiBot@v2_k9
        with:
          config: ${{ matrix.dir }}/${{ matrix.model_config }}
          schema: ${{ matrix.dir }}/${{ matrix.schematic }}
          board: ${{ matrix.dir }}/${{ matrix.board }}
          dir: ${{ matrix.dir }}/output/3d-source

      - name: Find exported VRML model
        id: find-vrml
        if: ${{ always() }}
        shell: bash
        run: |
          set -euo pipefail
          model_dir="hardware-3d-artifacts/${{ matrix.slug }}/model"
          mkdir -p "$model_dir"

          mapfile -t board_vrml_candidates < <(find "${{ matrix.dir }}/output/3d-source" \( -iname '*.wrl' -o -iname '*.vrml' \) ! -path '*/shapes3D/*' -print 2>/dev/null | sort)
          if [ "${#board_vrml_candidates[@]}" -gt 0 ]; then
            vrml_path="${board_vrml_candidates[0]}"
          else
            vrml_path="$(find "${{ matrix.dir }}/output/3d-source" \( -iname '*.wrl' -o -iname '*.vrml' \) -print 2>/dev/null | sort | head -n 1 || true)"
          fi
          echo "path=${vrml_path}" >> "$GITHUB_OUTPUT"

          if [ -z "$vrml_path" ]; then
            {
              echo "No VRML model was generated for ${{ matrix.name }}."
              echo "KiBot VRML step outcome: ${{ steps.export-vrml.outcome }}"
            } > "$model_dir/README.txt"
          else
            echo "Selected VRML model: $vrml_path"
            cp "$vrml_path" "$model_dir/board.wrl"
          fi

      - name: Install Blender
        if: ${{ steps.find-vrml.outputs.path != '' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y blender python3-numpy xvfb libegl1 libgl1 libglx-mesa0 libxi6 libxrender1

      - name: Convert VRML model to GLB
        if: ${{ steps.find-vrml.outputs.path != '' }}
        shell: bash
        run: |
          set -euo pipefail
          model_dir="hardware-3d-artifacts/${{ matrix.slug }}/model"
          mkdir -p "$model_dir"

          xvfb-run -a blender --background --python tools/hardware-3d/convert_vrml_to_glb.py -- \
            "${{ steps.find-vrml.outputs.path }}" \
            "$model_dir/board.glb" \
            "$model_dir/board-preview.png"

          test -s "$model_dir/board.glb"
          test -s "$model_dir/board-preview.png"

      - name: Upload 3D model outputs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.slug }}-3d-model
          path: hardware-3d-artifacts/${{ matrix.slug }}
          if-no-files-found: warn

  hardware-visual-diff:
    name: Visual diff (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs:
      - project-matrix
    if: ${{ github.event_name == 'pull_request' }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.project-matrix.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install visual diff tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y software-properties-common
          sudo add-apt-repository --yes ppa:kicad/kicad-9.0-releases
          sudo apt-get update
          sudo apt-get install -y kicad imagemagick librsvg2-bin

      - name: Generate schematic and PCB visual diffs
        id: generate-visual-diff
        shell: bash
        env:
          DIFF_BASE_REF: ${{ github.event_name == 'pull_request' && github.base_ref || github.event.inputs.diff_base_ref || 'main' }}
        run: |
          set -euo pipefail

          project_name='${{ matrix.name }}'
          project_slug='${{ matrix.slug }}'
          project_dir='${{ matrix.dir }}'
          schematic_file='${{ matrix.schematic }}'
          board_file='${{ matrix.board }}'
          base_ref="${DIFF_BASE_REF:-main}"
          if [ -z "$base_ref" ] || [ "$base_ref" = "null" ]; then
            base_ref="main"
          fi

          out_root="visual-diff-output/$project_slug"
          work_root="visual-diff-work/$project_slug"
          base_tree="visual-diff-work/base"
          mkdir -p "$out_root" "$work_root"

          git fetch origin "$base_ref" --depth=1
          rm -rf "$base_tree"
          git worktree add --detach "$base_tree" "origin/$base_ref"

          current_schematic="$project_dir/$schematic_file"
          current_board="$project_dir/$board_file"
          base_schematic="$base_tree/$project_dir/$schematic_file"
          base_board="$base_tree/$project_dir/$board_file"

          if [ ! -f "$base_schematic" ] || [ ! -f "$base_board" ]; then
            mkdir -p "$out_root"
            cat > "$out_root/README.md" <<EOF
          # Visual diff unavailable

          The project \`$project_name\` does not exist at baseline ref \`$base_ref\`, or its schematic/PCB file names differ.
          EOF
            cat > "$out_root/SUMMARY.md" <<EOF
          Baseline ref: \`$base_ref\`

          No visual diff was generated because this project was not found in the baseline.
          EOF
            cp "$out_root/SUMMARY.md" "$out_root/GITHUB_SUMMARY.md"
            exit 0
          fi

          kicad_cli() {
            kicad-cli "$@"
          }

          mkdir -p \
            "$out_root/base/schematic" \
            "$out_root/current/schematic" \
            "$out_root/base/pcb" \
            "$out_root/current/pcb" \
            "$out_root/diff/schematic" \
            "$out_root/diff/pcb"

          kicad_cli sch export svg --output "$out_root/base/schematic" "$base_schematic"
          kicad_cli sch export svg --output "$out_root/current/schematic" "$current_schematic"

          pcb_layers=(F.Cu B.Cu F.SilkS B.SilkS F.Mask B.Mask Edge.Cuts)
          for layer in "${pcb_layers[@]}"; do
            safe_layer="${layer//./_}"
            kicad_cli pcb export svg --layers "$layer" --output "$out_root/base/pcb/$safe_layer.svg" "$base_board"
            kicad_cli pcb export svg --layers "$layer" --output "$out_root/current/pcb/$safe_layer.svg" "$current_board"
          done

          combined_layers="$(IFS=,; echo "${pcb_layers[*]}")"
          kicad_cli pcb export svg --layers "$combined_layers" --output "$out_root/base/pcb/All_Layers.svg" "$base_board"
          kicad_cli pcb export svg --layers "$combined_layers" --output "$out_root/current/pcb/All_Layers.svg" "$current_board"

          image_size() {
            identify -format "%w %h" "$1"
          }

          write_diff_svg() {
            local base_svg="$1"
            local current_svg="$2"
            local label="$3"
            local output_svg="$4"
            local scratch="$work_root/$(echo "$label" | tr '/ .:' '____')"
            mkdir -p "$scratch" "$(dirname "$output_svg")"

            rsvg-convert "$base_svg" -o "$scratch/base.png"
            rsvg-convert "$current_svg" -o "$scratch/current.png"

            base_dims="$(image_size "$scratch/base.png")"
            current_dims="$(image_size "$scratch/current.png")"
            read -r base_w base_h <<< "$base_dims"
            read -r current_w current_h <<< "$current_dims"
            max_w="$base_w"
            max_h="$base_h"
            if [ "$current_w" -gt "$max_w" ]; then max_w="$current_w"; fi
            if [ "$current_h" -gt "$max_h" ]; then max_h="$current_h"; fi

            convert "$scratch/base.png" -background white -gravity northwest -extent "${max_w}x${max_h}" "$scratch/base-normalized.png"
            convert "$scratch/current.png" -background white -gravity northwest -extent "${max_w}x${max_h}" "$scratch/current-normalized.png"
            compare "$scratch/base-normalized.png" "$scratch/current-normalized.png" "$scratch/diff.png" >/dev/null 2>&1 || true

            local gap=24
            local label_h=36
            local canvas_w=$((max_w * 3 + gap * 4))
            local canvas_h=$((max_h + label_h + gap * 2))
            local base_x="$gap"
            local current_x=$((max_w + gap * 2))
            local diff_x=$((max_w * 2 + gap * 3))
            local image_y=$((label_h + gap))
            local title_y=24
            local b64_base b64_current b64_diff
            b64_base="$(base64 -w0 "$scratch/base-normalized.png")"
            b64_current="$(base64 -w0 "$scratch/current-normalized.png")"
            b64_diff="$(base64 -w0 "$scratch/diff.png")"

            cat > "$output_svg" <<EOF
          <svg xmlns="http://www.w3.org/2000/svg" width="$canvas_w" height="$canvas_h" viewBox="0 0 $canvas_w $canvas_h" role="img" aria-label="$label visual diff">
            <rect width="100%" height="100%" fill="#ffffff"/>
            <style>
              text { font-family: Arial, sans-serif; font-size: 16px; fill: #111827; }
              .label { font-weight: 700; }
            </style>
            <text class="label" x="$base_x" y="$title_y">$label baseline</text>
            <text class="label" x="$current_x" y="$title_y">$label current</text>
            <text class="label" x="$diff_x" y="$title_y">$label diff</text>
            <image href="data:image/png;base64,$b64_base" x="$base_x" y="$image_y" width="$max_w" height="$max_h"/>
            <image href="data:image/png;base64,$b64_current" x="$current_x" y="$image_y" width="$max_w" height="$max_h"/>
            <image href="data:image/png;base64,$b64_diff" x="$diff_x" y="$image_y" width="$max_w" height="$max_h"/>
          </svg>
          EOF
          }

          shopt -s globstar nullglob
          generated=0

          for current_svg in "$out_root/current/schematic"/*.svg; do
            name="$(basename "$current_svg")"
            base_svg="$out_root/base/schematic/$name"
            if [ -f "$base_svg" ]; then
              output_svg="$out_root/diff/schematic/$name"
              write_diff_svg "$base_svg" "$current_svg" "Schematic $name" "$output_svg"
              generated=$((generated + 1))
            fi
          done

          for current_svg in "$out_root/current/pcb"/*.svg; do
            name="$(basename "$current_svg")"
            base_svg="$out_root/base/pcb/$name"
            if [ -f "$base_svg" ]; then
              output_svg="$out_root/diff/pcb/$name"
              write_diff_svg "$base_svg" "$current_svg" "PCB ${name%.svg}" "$output_svg"
              generated=$((generated + 1))
            fi
          done

          {
            if [ "$generated" -eq 0 ]; then
              echo "Baseline ref: \`$base_ref\`"
              echo
              echo "No matching schematic or PCB SVGs were available to diff."
            else
              echo "Baseline ref: \`$base_ref\`"
              echo
              echo "Generated $generated visual diff SVG file(s)."
              echo
              echo "## Diff Files"
              echo
              for diff_svg in "$out_root"/diff/**/*.svg; do
                rel="${diff_svg#$out_root/diff/}"
                size_bytes="$(wc -c < "$diff_svg" | tr -d ' ')"
                printf -- '- `%s` (%s bytes)\n' "$rel" "$size_bytes"
              done
            fi
          } > "$out_root/GITHUB_SUMMARY.md"

          cp "$out_root/GITHUB_SUMMARY.md" "$out_root/SUMMARY.md"
          if [ "$generated" -gt 0 ]; then
            {
              echo
              echo "## Embedded Preview"
              echo
              if [ -f "$out_root/diff/pcb/All_Layers.svg" ]; then
                echo "![Combined PCB diff](diff/pcb/All_Layers.svg)"
                echo
              fi
              schematic_preview="$(find "$out_root/diff/schematic" -maxdepth 1 -type f -name '*.svg' -print | sort | head -n 1 || true)"
              if [ -n "$schematic_preview" ]; then
                schematic_rel="${schematic_preview#$out_root/}"
                echo "![Schematic diff]($schematic_rel)"
                echo
              fi
            } >> "$out_root/SUMMARY.md"
          fi

      - name: Upload visual diff artifact
        id: upload-visual-diff
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.slug }}-visual-diff
          path: visual-diff-output/${{ matrix.slug }}
          if-no-files-found: warn

      - name: Add visual diff links to summary
        if: ${{ always() }}
        shell: bash
        env:
          ARTIFACT_URL: ${{ steps.upload-visual-diff.outputs.artifact-url }}
        run: |
          set -euo pipefail
          project_name='${{ matrix.name }}'
          project_slug='${{ matrix.slug }}'
          out_root="visual-diff-output/$project_slug"

          {
            echo "## Visual diff: $project_name"
            echo
            if [ -n "${ARTIFACT_URL:-}" ]; then
              echo "[Download \`$project_slug-visual-diff\` artifact](${ARTIFACT_URL})"
            else
              echo "Visual diff artifact link is unavailable. Open the run's Artifacts section and download \`$project_slug-visual-diff\`."
            fi
            echo
            if [ -f "$out_root/GITHUB_SUMMARY.md" ]; then
              cat "$out_root/GITHUB_SUMMARY.md"
            else
              echo "No visual diff summary file was generated."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build-pages-site:
    name: Build GitHub Pages site
    runs-on: ubuntu-latest
    needs:
      - project-matrix
      - hardware-checks
      - hardware-outputs
      - hardware-3d-model
      - hardware-visual-diff
    if: ${{ always() }}
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Download hardware artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: artifacts

      - name: Assemble static site
        shell: bash
        env:
          PROJECTS_JSON: ${{ needs.project-matrix.outputs.projects }}
          CHECKS_RESULT: ${{ needs.hardware-checks.result }}
          OUTPUTS_RESULT: ${{ needs.hardware-outputs.result }}
          MODELS_RESULT: ${{ needs.hardware-3d-model.result }}
          VISUAL_DIFF_RESULT: ${{ needs.hardware-visual-diff.result }}
        run: |
          set -euo pipefail

          mkdir -p site/projects
          cp tools/hardware-site/style.css site/style.css
          cat > site/index.html <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Hardware Boards</title>
              <link rel="stylesheet" href="style.css">
            </head>
            <body>
              <header class="topbar">
                <div>
                  <p class="eyebrow">KiCad CI review</p>
                  <h1>Hardware Boards</h1>
                </div>
                <nav aria-label="Project links">
                  <a href="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}">Actions run</a>
                </nav>
              </header>
              <main>
                <section class="status-band" aria-label="Build status">
                  <div>
                    <span class="label">Run</span>
                    <a href="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}">GitHub Actions</a>
                  </div>
                  <div>
                    <span class="label">Commit</span>
                    <code>${GITHUB_SHA:0:12}</code>
                  </div>
                  <div>
                    <span class="label">ERC / DRC</span>
                    <code>${CHECKS_RESULT:-unknown}</code>
                  </div>
                  <div>
                    <span class="label">Outputs</span>
                    <code>${OUTPUTS_RESULT:-unknown}</code>
                  </div>
                  <div>
                    <span class="label">3D</span>
                    <code>${MODELS_RESULT:-unknown}</code>
                  </div>
                </section>
                <section class="section">
                  <div class="section-heading">
                    <h2>Boards</h2>
                    <p>Select a board to review generated reports, fabrication files, PDFs, and 3D model output.</p>
                  </div>
                  <div class="board-grid">
          EOF

          echo "$PROJECTS_JSON" | jq -c '.[]' | while read -r project; do
            slug="$(echo "$project" | jq -r '.slug')"
            name="$(echo "$project" | jq -r '.name')"
            project_dir="$(echo "$project" | jq -r '.dir')"
            project_file="$(echo "$project" | jq -r '.project')"
            schematic_file="$(echo "$project" | jq -r '.schematic')"
            board_file="$(echo "$project" | jq -r '.board')"
            basename="$(echo "$project" | jq -r '.basename')"

            project_site="site/projects/$slug"
            mkdir -p "$project_site/reports" "$project_site/outputs" "$project_site/kicad" "$project_site/model"
            cp tools/hardware-site/index.html "$project_site/index.html"
            cp tools/hardware-site/style.css "$project_site/style.css"
            escape_sed() {
              printf '%s' "$1" | sed 's/[\/&]/\\&/g'
            }
            sed -i \
              -e "s/__PROJECT_NAME__/$(escape_sed "$name")/g" \
              -e "s/__PROJECT_FILE__/$(escape_sed "$project_file")/g" \
              -e "s/__SCHEMATIC_FILE__/$(escape_sed "$schematic_file")/g" \
              -e "s/__BOARD_FILE__/$(escape_sed "$board_file")/g" \
              -e "s/__BASE_NAME__/$(escape_sed "$basename")/g" \
              "$project_site/index.html"
            cp "$project_dir/$project_file" "$project_site/kicad/"
            cp "$project_dir/$schematic_file" "$project_site/kicad/"
            cp "$project_dir/$board_file" "$project_site/kicad/"

            if [ -d "artifacts/$slug-check-reports" ]; then
              cp -a "artifacts/$slug-check-reports/." "$project_site/reports/"
            fi
            if [ -d "artifacts/$slug-hardware-outputs" ]; then
              cp -a "artifacts/$slug-hardware-outputs/." "$project_site/outputs/"
            fi
            if [ -d "artifacts/$slug-3d-model/model" ]; then
              cp -a "artifacts/$slug-3d-model/model/." "$project_site/model/"
            fi

            cat > "$project_site/run-info.js" <<EOF
          window.HARDWARE_CI = {
            runUrl: "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}",
            sha: "${GITHUB_SHA}",
            checksResult: "${CHECKS_RESULT:-unknown}",
            outputsResult: "${OUTPUTS_RESULT:-unknown}",
            modelsResult: "${MODELS_RESULT:-unknown}",
            projectName: "${name}",
            projectSlug: "${slug}",
            projectFile: "${project_file}",
            schematicFile: "${schematic_file}",
            boardFile: "${board_file}",
            baseName: "${basename}"
          };
          EOF

            if [ ! -f "$project_site/reports/$basename-erc.html" ]; then
              printf '<!doctype html><title>ERC report unavailable</title><h1>ERC report unavailable</h1><p>No ERC report artifact was produced for this run.</p>' > "$project_site/reports/$basename-erc.html"
            fi
            if [ ! -f "$project_site/reports/$basename-drc.html" ]; then
              printf '<!doctype html><title>DRC report unavailable</title><h1>DRC report unavailable</h1><p>No DRC report artifact was produced for this run.</p>' > "$project_site/reports/$basename-drc.html"
            fi

            cat >> site/index.html <<EOF
                    <a class="board-card" href="projects/$slug/">
                      <span class="board-name">$name</span>
                      <span class="board-path">$project_dir</span>
                      <span class="board-meta">$board_file</span>
                    </a>
          EOF
          done

          cat >> site/index.html <<EOF
                  </div>
                </section>
              </main>
            </body>
          </html>
          EOF

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build-pages-site
    if: ${{ github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') }}
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  hardware-summary:
    name: Hardware links
    runs-on: ubuntu-latest
    needs:
      - project-matrix
      - hardware-checks
      - hardware-outputs
      - hardware-3d-model
      - deploy-pages
    if: ${{ always() }}

    steps:
      - name: Add links to run summary
        shell: bash
        env:
          PROJECTS_JSON: ${{ needs.project-matrix.outputs.projects }}
          CHECKS_RESULT: ${{ needs.hardware-checks.result }}
          OUTPUTS_RESULT: ${{ needs.hardware-outputs.result }}
          MODELS_RESULT: ${{ needs.hardware-3d-model.result }}
          PAGES_URL: ${{ needs.deploy-pages.outputs.page_url }}
        run: |
          set -euo pipefail

          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          artifacts_url="$run_url#artifacts"
          pages_base="${PAGES_URL%/}"

          {
            echo '# Hardware CI Summary'
            echo
            echo "| Item | Result |"
            echo "| --- | --- |"
            echo "| ERC and DRC | \`${CHECKS_RESULT}\` |"
            echo "| Documentation and fabrication outputs | \`${OUTPUTS_RESULT}\` |"
            echo "| 3D model generation | \`${MODELS_RESULT}\` |"
            echo "| Visual diff generation | \`${VISUAL_DIFF_RESULT:-unknown}\` |"
            echo
            echo "Run: [${GITHUB_RUN_ID}](${run_url})"
            if [ -n "${PAGES_URL:-}" ]; then
              echo
              echo "Published review site: [${PAGES_URL}](${PAGES_URL})"
            fi
            echo
            echo '> GitHub Actions artifacts are downloaded as archives. The review site links directly to deployed files after Pages is published.'
            echo
            echo '## Projects'
            echo
            echo '| Project | Review site | Artifacts |'
            echo '| --- | --- | --- |'
            echo "$PROJECTS_JSON" | jq -c '.[]' | while read -r project; do
              slug="$(echo "$project" | jq -r '.slug')"
              name="$(echo "$project" | jq -r '.name')"
              if [ -n "${PAGES_URL:-}" ]; then
                page_link="[Open](${pages_base}/projects/${slug}/)"
              else
                page_link="Pages not published"
              fi
              printf '| %s | %s | [%s reports, outputs, 3D](%s) |\n' "$name" "$page_link" "$slug" "$artifacts_url"
            done
          } >> "$GITHUB_STEP_SUMMARY"

  hardware-gate:
    name: Hardware CI gate
    runs-on: ubuntu-latest
    needs:
      - hardware-checks
      - hardware-outputs
      - build-pages-site
      - deploy-pages
      - hardware-summary
    if: ${{ always() }}

    steps:
      - name: Fail if validation or output generation failed
        shell: bash
        env:
          CHECKS_RESULT: ${{ needs.hardware-checks.result }}
          OUTPUTS_RESULT: ${{ needs.hardware-outputs.result }}
          PAGES_BUILD_RESULT: ${{ needs.build-pages-site.result }}
          PAGES_RESULT: ${{ needs.deploy-pages.result }}
        run: |
          set -euo pipefail
          failed=0

          if [ "${CHECKS_RESULT:-failure}" != "success" ]; then
            echo "ERC/DRC failed, was skipped, or did not complete: ${CHECKS_RESULT:-missing}"
            failed=1
          fi

          if [ "${OUTPUTS_RESULT:-failure}" != "success" ]; then
            echo "Hardware output generation failed, was skipped, or did not complete: ${OUTPUTS_RESULT:-missing}"
            failed=1
          fi

          if [ "${PAGES_BUILD_RESULT:-failure}" != "success" ]; then
            echo "GitHub Pages site build failed or did not complete: ${PAGES_BUILD_RESULT:-missing}"
            failed=1
          fi

          if [ "${GITHUB_EVENT_NAME}" != "pull_request" ] && { [ "${GITHUB_REF}" = "refs/heads/main" ] || [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; } && [ "${PAGES_RESULT}" != "success" ]; then
            echo "GitHub Pages deployment failed or did not complete: ${PAGES_RESULT}"
            failed=1
          fi

          exit "$failed"
